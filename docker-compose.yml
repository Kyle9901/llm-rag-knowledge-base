services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: ${DOCKER_PYTHON_IMAGE:-python:3.12-slim}
    container_name: rag-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/rag_backend
      CHROMA_PERSIST_DIR: /app/chroma_db
      UPLOAD_DIR: /app/data/uploads
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./chroma_db:/app/chroma_db
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: ${DOCKER_PYTHON_IMAGE:-python:3.12-slim}
    container_name: rag-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/rag_backend
      CHROMA_PERSIST_DIR: /app/chroma_db
      UPLOAD_DIR: /app/data/uploads
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./chroma_db:/app/chroma_db
    command: ["python", "-m", "celery", "-A", "core.celery_app:celery_app", "worker", "--loglevel=info", "-P", "threads"]

  redis:
    image: ${DOCKER_REDIS_IMAGE:-redis:7-alpine}
    container_name: rag-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: ${DOCKER_POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: rag-postgres
    environment:
      POSTGRES_DB: rag_backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag_backend"]
      interval: 5s
      timeout: 3s
      retries: 15

volumes:
  postgres_data:
